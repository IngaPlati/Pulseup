<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PulseUp — Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0f1e3c;
            --white: #ffffff;
            --bg: #f0f3f8;
            --sidebar-w: 240px;
        }
        body {
            font-family: 'DM Sans', sans-serif;
            margin: 0;
            display: flex;
            background: var(--bg);
            border-top: 4px solid #1ec9b7;
        }
        .sidebar {
            width: var(--sidebar-w);
            background: var(--navy);
            min-height: 100vh;
            position: fixed;
            display: flex;
            flex-direction: column;
        }
        .sidebar-logo {
            color: white;
            padding: 30px 24px;
            font-weight: 700;
            font-size: 22px;
        }
        .nav-item {
            padding: 15px 24px;
            color: #a0aec0;
            text-decoration: none;
            font-size: 14px;
        }
        .nav-item.active {
            background: rgba(255,255,255,0.1);
            color: white;
        }
        .main {
            margin-left: var(--sidebar-w);
            flex: 1;
        }
        .topnav {
            height: 60px;
            background: white;
            display: flex;
            align-items: center;
            padding: 0 30px;
            border-bottom: 1px solid #dde3ec;
        }
        .topnav-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .user-name {
            font-size: 13px;
            font-weight: 700;
            color: var(--navy);
        }
        .avatar {
            width: 35px;
            height: 35px;
            background: #c9d4e8;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }
        .page-body {
            padding: 40px;
        }
        .hero {
            background: var(--navy);
            color: white;
            padding: 40px;
            border-radius: 20px;
        }
        .hero-count {
            font-size: 32px;
            font-weight: bold;
        }

    </style>
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-logo">PulseUp</div>
    <a class="nav-item active" href="DashboardAdmin.html">Dashboard</a>
    <a class="nav-item" href="Appointments.html">Bookings</a>
    <a class="nav-item" href="Healthquest.html">Health Quests</a>
    <a class="nav-item" href="Sicknote.html">Sick Notes</a>
    <div class="nav-spacer"></div>
    <div class="nav-logout" id="logoutBtn" style="cursor:pointer; padding: 15px 24px; color: #a0aec0; font-size: 14px;">Logout</div>
</aside>

<div class="main">
    <nav class="topnav">
        <div class="topnav-right">
            <div class="user-info">
                <div class="user-name" id="adminNameDisplay">STAFF MEMBER</div>
                <div class="user-id" id="adminRoleDisplay">VERIFYING...</div>
            </div>
            <div class="avatar" id="adminAvatar">--</div>
        </div>
    </nav>
    <div class="page-body">
        <div class="hero">
            <h1 id="dynamicGreeting">Welcome to PulseUp</h1>
            <div class="hero-appt-box">
                <span class="hero-label">Live Booking Count</span>
                <div class="hero-count">
                    <span id="totalCount">0</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="js/auth/dashboardAdmin.js"></script>
</body>
</html>
